<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoxelCraft - Open World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:'Segoe UI',sans-serif;overflow:hidden;background:#000}
#hud{position:absolute;top:15px;left:15px;z-index:100;color:#fff;text-shadow:2px 2px 3px #000;pointer-events:none}
#stats{background:rgba(0,0,0,.75);backdrop-filter:blur(8px);border:2px solid rgba(255,215,0,.5);border-radius:15px;padding:15px 20px;min-width:280px;border-left:4px solid gold}
#stats h1{color:gold;font-size:20px;margin-bottom:12px;text-align:center;border-bottom:1px solid rgba(255,215,0,.3);padding-bottom:8px}
.bar{width:100%;height:12px;background:#333;border-radius:8px;margin:6px 0;overflow:hidden;border:1px solid #555}
#hp-fill{height:100%;background:linear-gradient(90deg,#f44,#f99);transition:width .3s}
#st-fill{height:100%;background:linear-gradient(90deg,#4f4,#9f9);transition:width .3s}
.info{display:flex;justify-content:space-between;margin:8px 0;font-size:14px}
.label{color:#aaa}
.value{color:gold;font-weight:bold}
#crosshair{position:absolute;top:50%;left:50%;width:24px;height:24px;margin:-12px 0 0 -12px;border:2px solid rgba(255,255,255,.9);border-radius:50%;pointer-events:none;z-index:99;box-shadow:0 0 15px rgba(0,255,255,.4);transition:all .1s}
#crosshair.hit{border-color:#f00;transform:scale(1.3);box-shadow:0 0 20px rgba(255,0,0,.8)}
#crosshair.place{border-color:#0f0;transform:scale(1.3);box-shadow:0 0 20px rgba(0,255,0,.8)}
#crosshair::after{content:'';position:absolute;top:50%;left:50%;width:4px;height:4px;margin:-2px 0 0 -2px;background:#fff;border-radius:50%;box-shadow:0 0 8px cyan}
#hotbar{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);display:flex;gap:10px;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);padding:12px 18px;border-radius:40px;border:2px solid rgba(255,215,0,.4);z-index:100}
.slot{width:70px;height:70px;background:rgba(40,40,40,.9);border:2px solid #666;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;cursor:pointer;position:relative;transition:all .2s}
.slot:hover{border-color:#fa0;transform:scale(1.05)}
.slot.active{border-color:#ff0;background:rgba(70,70,70,.95);transform:translateY(-8px) scale(1.1);box-shadow:0 8px 20px rgba(255,170,0,.5)}
.slot-num{position:absolute;top:4px;left:6px;font-size:11px;color:#aaa;font-weight:bold}
.slot-count{position:absolute;bottom:4px;right:6px;font-size:13px;color:#ff0;font-weight:bold}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);border:3px solid gold;border-radius:20px;padding:20px 50px;color:#fff;font-size:28px;font-weight:bold;text-shadow:2px 2px 4px #000;pointer-events:none;box-shadow:0 0 60px rgba(255,215,0,.8);display:none;animation:popIn .3s}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(0.5);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
#minimap{position:absolute;top:15px;right:15px;width:180px;height:180px;background:rgba(0,0,0,.8);border:3px solid gold;border-radius:20px;overflow:hidden}
#debug{position:absolute;bottom:15px;right:15px;background:rgba(0,20,0,.85);border:2px solid #0f0;border-radius:12px;padding:10px 15px;color:#0f0;font-family:'Courier New',monospace;font-size:11px;pointer-events:none}
.dline{display:flex;justify-content:space-between;gap:15px;margin:3px 0;border-bottom:1px dotted #0a3;padding:2px 0}
#help{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);padding:10px 20px;border-radius:15px;color:#fff;font-size:14px;text-align:center;pointer-events:none;display:none}
</style>
</head>
<body>
<div id="hud">
<div id="stats">
<h1>⚔️ VoxelCraft ⚔️</h1>
<div style="color:#f99;font-size:12px;margin-bottom:4px">❤️ 体力</div>
<div class="bar"><div id="hp-fill" style="width:100%"></div></div>
<div style="color:#9f9;font-size:12px;margin-bottom:4px;margin-top:8px">⚡ スタミナ</div>
<div class="bar"><div id="st-fill" style="width:100%"></div></div>
<div class="info"><span class="label">📍 位置</span><span class="value" id="pos">0, 0, 0</span></div>
<div class="info"><span class="label">🎮 FPS</span><span class="value" id="fps">0</span></div>
<div class="info"><span class="label">📦 ブロック</span><span class="value" id="blocks">0</span></div>
<div class="info"><span class="label">⏰ 時刻</span><span class="value" id="time">12:00</span></div>
<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,215,0,.3)">
<div style="color:gold;font-size:14px;margin-bottom:6px">📜 クエスト</div>
<div style="font-size:12px;color:#ccc" id="quest">自由に建築を楽しもう！</div>
</div>
</div>
</div>
<div id="crosshair"></div>
<div id="hotbar"></div>
<div id="msg"></div>
<canvas id="minimap" width="180" height="180"></canvas>
<div id="debug">
<div class="dline"><span>チャンク:</span><span id="chunk">0,0</span></div>
<div class="dline"><span>高度:</span><span id="altitude">0</span></div>
<div class="dline"><span>バイオーム:</span><span id="biome">平原</span></div>
</div>
<div id="help">
左クリック: 破壊 | 右クリック: 設置<br>
WASD: 移動 | Shift: ダッシュ | Space: ジャンプ
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.150.0/build/three.module.js"}}</script>
<script type="module">
import*as THREE from'three';

const CFG={
CS:20,RD:4,CH:64,PS:7,PSS:12,JF:11,G:25
};

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);
scene.fog=new THREE.Fog(0x87ceeb,80,150);

const cam=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,300);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
document.body.appendChild(renderer.domElement);

const sun=new THREE.DirectionalLight(0xffffff,1);
sun.position.set(50,80,50);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x606060));

const BT={AIR:0,GRASS:1,DIRT:2,STONE:3,WOOD:4,LEAF:5,SAND:7,WATER:8,COAL:9,PLANKS:10};
const BC={1:0x7cfc00,2:0x8b4513,3:0x808080,4:0x8b5a2b,5:0x228b22,7:0xf4e542,8:0x4db8ff,9:0x333333,10:0xdeb887};
const BI={1:'🌿',2:'🟫',3:'🪨',4:'🪵',5:'🍃',7:'🏖️',8:'💧',9:'⚫',10:'🟦'};

function noise(x,z,s=.03){
const X=Math.floor(x*s)&255,Z=Math.floor(z*s)&255;
return(Math.sin(X*12.9898+Z*78.233)*43758.5453)%1;
}

function getH(x,z){
const n1=noise(x,z,.008)*25;
const n2=noise(x,z,.03)*8;
const n3=noise(x,z,.1)*3;
return Math.floor(30+n1+n2+n3);
}

function getBiome(x,z){
const t=noise(x,z,.005);
const h=noise(x+1000,z+1000,.005);
if(t>.6&&h>.6)return'forest';
if(t<.3&&h<.4)return'desert';
if(t>.7)return'mountain';
return'plains';
}

class Chunk{
constructor(cx,cz){
this.cx=cx;
this.cz=cz;
this.blocks=new Uint8Array(CFG.CS*CFG.CH*CFG.CS);
this.mesh=null;
this.generated=false;
}

idx(lx,ly,lz){
if(lx<0||lx>=CFG.CS||ly<0||ly>=CFG.CH||lz<0||lz>=CFG.CS)return-1;
return ly*CFG.CS*CFG.CS+lz*CFG.CS+lx;
}

get(lx,ly,lz){
const i=this.idx(lx,ly,lz);
return i===-1?BT.AIR:this.blocks[i];
}

set(lx,ly,lz,t){
const i=this.idx(lx,ly,lz);
if(i===-1)return;
this.blocks[i]=t;
this.buildMesh();
}

generate(){
if(this.generated)return;
this.generated=true;

for(let lx=0;lx<CFG.CS;lx++){
for(let lz=0;lz<CFG.CS;lz++){
const wx=this.cx*CFG.CS+lx,wz=this.cz*CFG.CS+lz;
const h=Math.min(getH(wx,wz),CFG.CH-5);
const biome=getBiome(wx,wz);

for(let ly=0;ly<CFG.CH;ly++){
let t=BT.AIR;
if(ly===0)t=BT.STONE;
else if(ly<h-4)t=BT.STONE;
else if(ly<h-1)t=BT.DIRT;
else if(ly===h){
if(biome==='desert')t=BT.SAND;
else t=BT.GRASS;
}
if(ly<h-8&&Math.random()<.015)t=BT.COAL;
this.blocks[this.idx(lx,ly,lz)]=t;
}

if(biome==='forest'&&Math.random()<.04&&h<CFG.CH-12){
const th=7+Math.floor(Math.random()*4);
for(let i=1;i<=th;i++)this.blocks[this.idx(lx,h+i,lz)]=BT.WOOD;
for(let dx=-2;dx<=2;dx++)for(let dz=-2;dz<=2;dz++)for(let dy=-1;dy<=2;dy++){
const nlx=lx+dx,nlz=lz+dz,nly=h+th+dy;
const ni=this.idx(nlx,nly,nlz);
if(ni!==-1&&this.blocks[ni]===BT.AIR&&(Math.abs(dx)+Math.abs(dz)<=3||dy>=0))this.blocks[ni]=BT.LEAF;
}
}
}
}
}

isVis(lx,ly,lz){
return this.get(lx-1,ly,lz)===BT.AIR||this.get(lx+1,ly,lz)===BT.AIR||
this.get(lx,ly-1,lz)===BT.AIR||this.get(lx,ly+1,lz)===BT.AIR||
this.get(lx,ly,lz-1)===BT.AIR||this.get(lx,ly,lz+1)===BT.AIR;
}

buildMesh(){
if(this.mesh){
scene.remove(this.mesh);
this.mesh.geometry.dispose();
this.mesh.material.dispose();
}

const geo=new THREE.BufferGeometry();
const verts=[],cols=[],norms=[];

const addFace=(x,y,z,dir,c)=>{
const r=(c>>16)/255,g=((c>>8)&255)/255,b=(c&255)/255;
const faces={
top:[[x,y+1,z],[x+1,y+1,z],[x+1,y+1,z+1],[x,y+1,z],[x+1,y+1,z+1],[x,y+1,z+1]],
bot:[[x,y,z],[x,y,z+1],[x+1,y,z+1],[x,y,z],[x+1,y,z+1],[x+1,y,z]],
front:[[x,y,z+1],[x,y+1,z+1],[x+1,y+1,z+1],[x,y,z+1],[x+1,y+1,z+1],[x+1,y,z+1]],
back:[[x,y,z],[x+1,y,z],[x+1,y+1,z],[x,y,z],[x+1,y+1,z],[x,y+1,z]],
left:[[x,y,z],[x,y+1,z],[x,y+1,z+1],[x,y,z],[x,y+1,z+1],[x,y,z+1]],
right:[[x+1,y,z],[x+1,y,z+1],[x+1,y+1,z+1],[x+1,y,z],[x+1,y+1,z+1],[x+1,y+1,z]]
};
const normals={top:[0,1,0],bot:[0,-1,0],front:[0,0,1],back:[0,0,-1],left:[-1,0,0],right:[1,0,0]};
faces[dir].forEach(v=>verts.push(...v));
for(let i=0;i<6;i++){
cols.push(r,g,b);
norms.push(...normals[dir]);
}
};

for(let ly=0;ly<CFG.CH;ly++){
for(let lz=0;lz<CFG.CS;lz++){
for(let lx=0;lx<CFG.CS;lx++){
const t=this.get(lx,ly,lz);
if(t===BT.AIR||!this.isVis(lx,ly,lz))continue;
const x=this.cx*CFG.CS+lx,y=ly,z=this.cz*CFG.CS+lz;
const c=BC[t]||0x888888;
if(this.get(lx,ly+1,lz)===BT.AIR)addFace(x,y,z,'top',c);
if(this.get(lx,ly-1,lz)===BT.AIR)addFace(x,y,z,'bot',c);
if(this.get(lx,ly,lz+1)===BT.AIR)addFace(x,y,z,'front',c);
if(this.get(lx,ly,lz-1)===BT.AIR)addFace(x,y,z,'back',c);
if(this.get(lx-1,ly,lz)===BT.AIR)addFace(x,y,z,'left',c);
if(this.get(lx+1,ly,lz)===BT.AIR)addFace(x,y,z,'right',c);
}
}
}

if(verts.length===0)return 0;

geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
geo.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));
geo.setAttribute('normal',new THREE.Float32BufferAttribute(norms,3));

const mat=new THREE.MeshLambertMaterial({vertexColors:true});
this.mesh=new THREE.Mesh(geo,mat);
scene.add(this.mesh);
return verts.length/3;
}

getHeightAt(lx,lz){
for(let ly=CFG.CH-1;ly>=0;ly--){
if(this.get(lx,ly,lz)!==BT.AIR)return ly+1;
}
return 0;
}
}

const chunks=new Map();

function getChunk(cx,cz){
const k=`${cx},${cz}`;
if(!chunks.has(k)){
const ch=new Chunk(cx,cz);
ch.generate();
ch.buildMesh();
chunks.set(k,ch);
}
return chunks.get(k);
}

function updChunks(){
const pcx=Math.floor(cam.position.x/CFG.CS);
const pcz=Math.floor(cam.position.z/CFG.CS);
const need=new Set();

for(let dz=-CFG.RD;dz<=CFG.RD;dz++){
for(let dx=-CFG.RD;dx<=CFG.RD;dx++){
const k=`${pcx+dx},${pcz+dz}`;
need.add(k);
getChunk(pcx+dx,pcz+dz);
}
}

for(let[k,ch]of chunks){
if(!need.has(k)){
if(ch.mesh)scene.remove(ch.mesh);
chunks.delete(k);
}
}

let tot=0;
for(let ch of chunks.values())if(ch.mesh)tot+=ch.mesh.geometry.attributes.position.count;
document.getElementById('blocks').textContent=tot;
document.getElementById('chunk').textContent=`${pcx},${pcz}`;
}

function getGroundHeight(x,z){
const cx=Math.floor(x/CFG.CS);
const cz=Math.floor(z/CFG.CS);
const ch=getChunk(cx,cz);
const lx=Math.floor(x)-cx*CFG.CS;
const lz=Math.floor(z)-cz*CFG.CS;
return ch.getHeightAt((lx+CFG.CS)%CFG.CS,(lz+CFG.CS)%CFG.CS);
}

const plr={
hp:100,st:100,vel:new THREE.Vector3(),og:false,
inv:[
{t:BT.GRASS,c:64},{t:BT.DIRT,c:64},{t:BT.STONE,c:64},
{t:BT.WOOD,c:32},{t:BT.PLANKS,c:32},{t:BT.SAND,c:32}
],sel:0
};

cam.position.set(0,100,0);
setTimeout(()=>{
const gh=getGroundHeight(0,0);
cam.position.y=gh+2;
},100);

function updHb(){
const hb=document.getElementById('hotbar');
hb.innerHTML='';
plr.inv.forEach((itm,i)=>{
const s=document.createElement('div');
s.className='slot'+(i===plr.sel?' active':'');
const n=document.createElement('div');
n.className='slot-num';
n.textContent=i+1;
s.appendChild(n);
const ic=document.createElement('div');
ic.textContent=BI[itm.t]||'📦';
ic.style.fontSize='28px';
s.appendChild(ic);
if(itm.c>1){
const cnt=document.createElement('div');
cnt.className='slot-count';
cnt.textContent=itm.c;
s.appendChild(cnt);
}
s.onclick=()=>{plr.sel=i;updHb()};
hb.appendChild(s);
});
}
updHb();

const keys={};
addEventListener('keydown',e=>{
keys[e.code]=true;
if(e.code.match(/Digit([1-6])/)){plr.sel=parseInt(RegExp.$1)-1;updHb()}
});
addEventListener('keyup',e=>keys[e.code]=false);

let mDown={l:false,r:false};
addEventListener('mousedown',e=>{
if(e.button===0)mDown.l=true;
if(e.button===2)mDown.r=true;
e.preventDefault();
});
addEventListener('mouseup',e=>{
if(e.button===0)mDown.l=false;
if(e.button===2)mDown.r=false;
});
addEventListener('contextmenu',e=>e.preventDefault());

let yaw=0,pitch=0;
addEventListener('mousemove',e=>{
if(document.pointerLockElement){
yaw-=e.movementX*.002;
pitch-=e.movementY*.002;
pitch=Math.max(-1.5,Math.min(1.5,pitch));
}
});
addEventListener('click',()=>document.body.requestPointerLock());

const rc=new THREE.Raycaster();
let cd=0;
const cross=document.getElementById('crosshair');

function hdAct(dt){
if(cd>0){cd-=dt;return}

const dir=new THREE.Vector3(0,0,-1);
dir.applyEuler(new THREE.Euler(pitch,yaw,0,'YXZ'));
rc.set(cam.position,dir);

let hit=null,hd=999;
for(let ch of chunks.values()){
if(!ch.mesh)continue;
const ints=rc.intersectObject(ch.mesh);
if(ints.length>0&&ints[0].distance<hd){
hit=ints[0];
hd=ints[0].distance;
}
}

if(mDown.l||mDown.r){
if(hit&&hd<6){
const p=hit.point.clone().add(hit.face.normal.clone().multiplyScalar(mDown.l?-.5:.5));
const lx=Math.floor(p.x)%CFG.CS,ly=Math.floor(p.y),lz=Math.floor(p.z)%CFG.CS;
const cx=Math.floor(p.x/CFG.CS),cz=Math.floor(p.z/CFG.CS);
const ch=chunks.get(`${cx},${cz}`);

if(ch){
const fx=(lx+CFG.CS)%CFG.CS,fz=(lz+CFG.CS)%CFG.CS;
if(mDown.l){
ch.set(fx,ly,fz,BT.AIR);
cross.className='hit';
setTimeout(()=>cross.className='',100);
showMsg('💥 破壊！',500);
}else if(mDown.r){
const itm=plr.inv[plr.sel];
if(itm&&itm.c>0){
ch.set(fx,ly,fz,itm.t);
itm.c--;
updHb();
cross.className='place';
setTimeout(()=>cross.className='',100);
showMsg('✅ 設置！',500);
}
}
cd=.15;
}
}
}
}

function showMsg(txt,dur=2000){
const m=document.getElementById('msg');
m.textContent=txt;
m.style.display='block';
setTimeout(()=>m.style.display='none',dur);
}

function updPlr(dt){
const dir=new THREE.Vector3(0,0,-1);
dir.applyEuler(new THREE.Euler(pitch,yaw,0,'YXZ'));
const fwd=new THREE.Vector3(dir.x,0,dir.z).normalize();
const rgt=new THREE.Vector3(-dir.z,0,dir.x).normalize();

let mx=0,mz=0;
if(keys.KeyW){mx+=fwd.x;mz+=fwd.z}
if(keys.KeyS){mx-=fwd.x;mz-=fwd.z}
if(keys.KeyD){mx+=rgt.x;mz+=rgt.z}
if(keys.KeyA){mx-=rgt.x;mz-=rgt.z}

const len=Math.sqrt(mx*mx+mz*mz);
if(len>0){mx/=len;mz/=len}

let spd=CFG.PS;
if(keys.ShiftLeft&&plr.st>0){
spd=CFG.PSS;
plr.st=Math.max(0,plr.st-20*dt);
}else{
plr.st=Math.min(100,plr.st+15*dt);
}

plr.vel.x=mx*spd;
plr.vel.z=mz*spd;
plr.vel.y-=CFG.G*dt;

const groundH=getGroundHeight(cam.position.x,cam.position.z);
if(cam.position.y+plr.vel.y*dt<=groundH+1.8){
plr.vel.y=0;
cam.position.y=groundH+1.8;
plr.og=true;
if(keys.Space&&plr.og){
plr.vel.y=CFG.JF;
plr.og=false;
plr.st-=5;
}
}else{
plr.og=false;
}

cam.position.x+=plr.vel.x*dt;
cam.position.y+=plr.vel.y*dt;
cam.position.z+=plr.vel.z*dt;
cam.rotation.order='YXZ';
cam.rotation.y=yaw;
cam.rotation.x=pitch;

document.getElementById('pos').textContent=`${cam.position.x.toFixed(0)}, ${cam.position.y.toFixed(0)}, ${cam.position.z.toFixed(0)}`;
document.getElementById('altitude').textContent=Math.floor(cam.position.y);
document.getElementById('hp-fill').style.width=`${plr.hp}%`;
document.getElementById('st-fill').style.width=`${plr.st}%`;

const biome=getBiome(cam.position.x,cam.position.z);
const biomeNames={plains:'平原',forest:'森林',desert:'砂漠',mountain:'山岳'};
document.getElementById('biome').textContent=biomeNames[biome]||'平原';
}

function updMM(){
const cv=document.getElementById('minimap');
const ctx=cv.getContext('2d');
ctx.fillStyle='#1a3a5a';
ctx.fillRect(0,0,180,180);

const px=cam.position.x,pz=cam.position.z;
for(let dz=-10;dz<=10;dz++){
for(let dx=-10;dx<=10;dx++){
const wx=px+dx*2,wz=pz+dz*2;
const biome=getBiome(wx,wz);
const colors={plains:'#7a9',forest:'#4a7',desert:'#da6',mountain:'#888'};
const x=90+dx*8,z=90+dz*8;
if(x>0&&x<180&&z>0&&z<180){
ctx.fillStyle=colors[biome]||'#4a7a9a';
ctx.fillRect(x,z,8,8);
}
}
}

ctx.fillStyle='#ff0';
ctx.beginPath();
ctx.arc(90,90,6,0,Math.PI*2);
ctx.fill();
ctx.strokeStyle='#fff';
ctx.lineWidth=3;
ctx.beginPath();
ctx.moveTo(90,90);
ctx.lineTo(90+Math.sin(yaw)*20,90-Math.cos(yaw)*20);
ctx.stroke();
}

showMsg('🌟 VoxelCraft Open World へようこそ！',3000);
setTimeout(()=>{
document.getElementById('help').style.display='block';
setTimeout(()=>document.getElementById('help').style.display='none',5000);
},3200);

let tod=.5;
const clk=new THREE.Clock();
let fc=0,lfps=Date.now();

function anim(){
const dt=Math.min(clk.getDelta(),.05);

updChunks();
updPlr(dt);
hdAct(dt);
updMM();

tod+=dt*.008;
if(tod>1)tod-=1;
const ang=tod*Math.PI*2;
sun.position.set(80*Math.cos(ang),60+40*Math.sin(ang),80*Math.sin(ang));
const br=Math.max(.35,Math.sin(ang));
sun.intensity=br*1.3;

const h=Math.floor(tod*24),m=Math.floor((tod*24%1)*60);
document.getElementById('time').textContent=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;

renderer.render(scene,cam);

fc++;
if(Date.now()-lfps>=1000){
document.getElementById('fps').textContent=fc;
fc=0;
lfps=Date.now();
}

requestAnimationFrame(anim);
}
anim();

addEventListener('resize',()=>{
cam.aspect=innerWidth/innerHeight;
cam.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
